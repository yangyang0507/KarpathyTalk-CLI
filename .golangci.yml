version: "2"

linters:
  default: none
  enable:
    - errcheck      # unhandled errors
    - gosimple      # simplification suggestions
    - govet         # suspicious constructs
    - ineffassign   # ineffectual assignments
    - staticcheck   # static analysis
    - unused        # unused code

linters-settings:
  errcheck:
    # Ignore error returns from fmt.Fprint* and flag.Parse (ExitOnError mode)
    ignore: "fmt:.*,github.com/charmbracelet/bubbletea:.*"

issues:
  exclude-rules:
    # Test files can use t.Error without checking returns
    - path: "_test\\.go"
      linters: [errcheck]
