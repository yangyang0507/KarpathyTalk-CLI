run:
  # Pin the Go version used for analysis.
  # golangci-lint v1.x refuses to run if go.mod's version exceeds the version
  # it was built with; setting this explicitly bypasses that check.
  go: "1.24"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck]
