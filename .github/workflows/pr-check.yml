name: PR Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (must match CHANGELOG groups in .goreleaser.yaml)
          types: |
            feat
            fix
            docs
            refactor
            chore
            ci
            build
          # Allow scope, e.g. "feat(tui): ..."
          requireScope: false
          # Disallow uppercase first letter after the colon, e.g. "feat: Add" → rejected
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
            Example: "feat: add dark mode support"

  size:
    name: Check PR size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count changed lines
        id: diff
        run: |
          LINES=$(git diff --stat origin/${{ github.base_ref }}...HEAD \
            -- '*.go' '*.md' '*.yaml' '*.yml' 'Makefile' \
            | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "Changed lines: $LINES"

      - name: Warn on large PR
        if: ${{ fromJSON(steps.diff.outputs.lines) > 500 }}
        run: |
          echo "::warning::This PR changes more than 500 lines. Consider splitting it into smaller PRs for easier review."
